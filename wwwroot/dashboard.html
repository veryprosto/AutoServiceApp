<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Панель управления - Клиенты</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <a href="dashboard.html">👥 Клиенты</a>
        <a href="employees.html">👨‍🔧 Сотрудники</a>
        <a href="report.html">📈 Отчеты</a>
    </nav>

    <div class="container">
        <div class="header">
            <h2>Список клиентов</h2>
            <div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
                <h4>Добавить нового клиента</h4>
                <input type="text" id="new-name" placeholder="Имя клиента" style="width: 200px; padding: 5px;">
                <input type="text" id="new-phone" placeholder="Телефон" style="width: 150px; padding: 5px;">
                <button onclick="addCustomer()"
                    style="padding: 6px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Сохранить
                </button>
            </div>

            <button class="logout" onclick="logout()">Выйти</button>
        </div>

        <table id="customers-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда JavaScript добавит строки -->
            </tbody>
        </table>
    </div>

    <script>
        // 1. Проверяем токен при входе на страницу
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = 'index.html'; // Если нет токена — на выход
        }

        async function loadCustomers() {
            try {
                const response = await fetch('http://localhost:5032/api/customers', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}` // ПЕРЕДАЕМ ТОКЕН
                    }
                });

                if (response.ok) {
                    const customers = await response.json();
                    const tbody = document.querySelector('#customers-table tbody');

                    customers.forEach(c => {
                        const row = `<tr>
                        <td>${c.id}</td>
                        <td>${c.name}</td>
                        <td>${c.phone}</td>
                        <td>
                            <button onclick="viewCars(${c.id})" style="padding: 4px 8px; cursor: pointer;">🚗 Машины</button>
                        </td>
                    </tr>`;
                        tbody.innerHTML += row;
                    });
                } else if (response.status === 401) {
                    alert('Сессия истекла. Войдите заново.');
                    logout();
                }
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        function logout() {
            localStorage.removeItem('jwt_token');
            window.location.href = 'index.html';
        }

        async function addCustomer() {
            const nameInput = document.getElementById('new-name');
            const phoneInput = document.getElementById('new-phone');

            const newCustomer = {
                name: nameInput.value,
                phone: phoneInput.value
            };

            try {
                const response = await fetch('http://localhost:5032/api/customers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(newCustomer)
                });

                if (response.ok) {
                    // Очищаем поля ввода
                    nameInput.value = '';
                    phoneInput.value = '';

                    // Обновляем таблицу (просто очищаем и загружаем заново для простоты)
                    document.querySelector('#customers-table tbody').innerHTML = '';
                    loadCustomers();
                } else {
                    alert('Ошибка при сохранении клиента');
                }
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        function viewCars(customerId) {
            // Сохраняем ID клиента в URL, чтобы следующая страница знала, чьи машины искать
            window.location.href = `cars.html?ownerId=${customerId}`;
        }

        // Запускаем загрузку при открытии страницы
        loadCustomers();
    </script>

</body>

</html>
